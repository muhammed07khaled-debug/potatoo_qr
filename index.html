<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Redirecting...</title> 
</head>
<body> 

    <div class="container" style="text-align: center; padding-top: 50px; font-family: sans-serif;"> 
        <p>Opening App...</p>
        <p style="font-size: 14px; color: #666;">
            If nothing happens, <a href="https://play.google.com/store/apps/details?id=com.supercell.clashroyale">click here to install</a>.
        </p>
    </div> 

    <script>
        window.onload = function() {
            // 1. Get the 'id' parameter from the URL
            const urlParams = new URLSearchParams(window.location.search);
            const menuId = urlParams.get('id');

            // 2. Fallback if no ID is provided in the URL
            if (!menuId) {
                console.error("No ID found in URL. Use ?id=YOUR_ID");
                return;
            }

            // 3. Construct the deep link with the dynamic ID
            const appLink = "potatoo://menu/" + menuId;
            const storeLink = "https://drive.google.com/file/d/1zwEF4kbfoAUph6CygrZlhCteVPaoiKI0/view?usp=drive_link";

            // 4. Attempt to open the app
            window.location.href = appLink;

            // 5. Fallback timer to Play Store
            setTimeout(function() {
                window.location.href = storeLink;
            }, 2500);
        };
    </script>

</body>
</html>
