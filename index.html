<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Redirecting 1...</title> 
</head>
<body> 

    <div class="container" style="text-align: center; padding-top: 50px; font-family: sans-serif;"> 
        <p>Opening Instagram...</p>
        <p style="font-size: 14px; color: #666;">
            If nothing happens, <a href="https://play.google.com/store/apps/details?id=com.supercell.clashroyale">click here to install</a>.
        </p>
    </div> 

    <script>
        window.onload = function() {
            // 1. Attempt to open the app link
            window.location.href = "potatoo://menu/699fde85c4b265cbfdd14669";

            // 2. Set a timer (2 seconds)
            // If the app doesn't open and the browser stays on this page, 
            // it will redirect to the Play Store.
            setTimeout(function() {
                window.location.href = "https://play.google.com/store/apps/details?id=com.supercell.clashroyale";
            }, 2000);
        };
    </script>

</body>
</html>
